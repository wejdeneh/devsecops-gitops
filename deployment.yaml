apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:
    metadata:
      labels:
        app: devsecops-demo

    spec:
      containers:
      - name: devsecops-demo
        image: wejdenehm/devsecops-demo:906d0d0ce250656bbdb8522979b68205ba2a83af
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
