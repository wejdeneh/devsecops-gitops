apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:
    metadata:
      labels:
        app: devsecops-demo

    spec:
      containers:
      - name: devsecops-demo
        image: wejdenehm/devsecops-demo:0535050c2b3b738d3824dc56050ab2383ff098ce
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
      serviceAccountName: devsecops-dashboard
