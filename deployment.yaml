apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:
    metadata:
      labels:
        app: devsecops-demo

    spec:
      containers:
      - name: devsecops-demo
        image: wejdenehm/devsecops-demo:4ea87d5566da71edb27b508026e2bb98890da2cd
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
