apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:
    metadata:
      labels:
        app: devsecops-demo

    spec:
      containers:
      - name: devsecops-demo
        image: wejdenehm/devsecops-demo:0c83c87f97ddb98756eb899df2cdd303ca13de69
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
      serviceAccountName: devsecops-dashboard
