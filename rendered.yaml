---
# Source: devsecops-demo/templates/service.yaml
apiVersion: v1
kind: Service

metadata:
  name: devsecops-demo
  labels:
    app: devsecops-demo

spec:
  type: NodePort

  selector:
    app: devsecops-demo

  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30090
---
# Source: devsecops-demo/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo
  labels:
    app: devsecops-demo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:

    metadata:
      labels:
        app: devsecops-demo

    spec:

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000


      containers:

      - name: devsecops-demo

        image: "wejdenehm/devsecops-demo:latest"

        imagePullPolicy: Always


        env:

        - name: APP_VERSION
          value: "latest"

        - name: BUILD_DATE
          value: "unknown"

        - name: BUILD_BRANCH
          value: "main"

        - name: BUILD_COMMIT
          value: "unknown"



        ports:

        - name: http
          containerPort: 5000
          protocol: TCP



        livenessProbe:

          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 15
          periodSeconds: 20



        readinessProbe:

          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 5
          periodSeconds: 10




        securityContext:

          allowPrivilegeEscalation: false

          capabilities:
            drop:
            - ALL

          readOnlyRootFilesystem: false



        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
# Source: devsecops-demo/templates/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: devsecops-demo-monitor

spec:

  selector:
    matchLabels:
      app: devsecops-demo

  endpoints:

  - port: http
    path: /metrics
    interval: 15s
