---
# Source: devsecops-demo/templates/service.yaml
apiVersion: v1
kind: Service


metadata:

  name:
    devsecops-demo


spec:

  type:
    NodePort


  selector:

    app:
      devsecops-demo


  ports:

  - port:
      80

    targetPort:
      5000

    nodePort:
      30090
---
# Source: devsecops-demo/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: devsecops-demo

spec:

  replicas: 2

  selector:
    matchLabels:
      app: devsecops-demo

  template:

    metadata:
      labels:
        app: devsecops-demo


    spec:

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000


      containers:

      - name: devsecops-demo

        image: "wejdenehm/devsecops-demo:latest"

        imagePullPolicy: Always


        ports:

        - containerPort: 5000


        securityContext:

          allowPrivilegeEscalation: false

          readOnlyRootFilesystem: false

          capabilities:
            drop:
              - ALL


        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
readinessProbe:

  httpGet:
    path: /health
    port: 5000

  initialDelaySeconds: 5
  periodSeconds: 10



livenessProbe:

  httpGet:
    path: /health
    port: 5000

  initialDelaySeconds: 15
  periodSeconds: 20
